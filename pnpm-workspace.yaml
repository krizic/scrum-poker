packages:
  - 'apps/*'
  - 'packages/*'

# Keep pnpm's approved native build allowlist (used by the legacy CRA app deps).
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  core-js: true
  core-js-pure: true
  esbuild: true
  git-stats: true
  leveldown: true
  prisma: true
  sharp: true
  sqlite3: true

minimumReleaseAgeExclude:
  - '@next/env@16.2.11'
  - '@next/swc-darwin-arm64@16.2.11'
  - '@next/swc-darwin-x64@16.2.11'
  - '@next/swc-linux-arm64-gnu@16.2.11'
  - '@next/swc-linux-arm64-musl@16.2.11'
  - '@next/swc-linux-x64-gnu@16.2.11'
  - '@next/swc-linux-x64-musl@16.2.11'
  - '@next/swc-win32-arm64-msvc@16.2.11'
  - '@next/swc-win32-x64-msvc@16.2.11'
  - next@16.2.11
