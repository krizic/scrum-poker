# docker-compose for local / self-hosted scrum-poker (issue #17).
#
# Brings up Postgres + the Next.js standalone server. On start, the web
# container applies Prisma migrations (RUN_MIGRATIONS=true) against the db
# service, then serves on :3000. See ".env.example" for the variables; copy it
# to ".env" and adjust as needed (compose auto-loads ".env").
#
# The PO's "Public QR invite" header button needs a public URL for developers
# outside the local network — pick ONE via PUBLIC_JOIN_URL_MODE:
#   - "local" (self-hosted behind a real domain): set PUBLIC_BASE_URL, no
#     extra container needed.
#   - "ngrok" (temporary local-dev tunnel, default): also set NGROK_AUTHTOKEN
#     AND `COMPOSE_PROFILES=ngrok` in ".env" to actually start the `ngrok`
#     sidecar below (it has `profiles: [ngrok]`, so it's skipped otherwise).
#
#   docker compose up --build        # build + run
#   curl http://localhost:3000/api/health   -> {"status":"ok"}
#   docker compose down -v           # stop + drop the db volume

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scrumpoker}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      # Exposed for local psql/debugging; remove in locked-down deploys.
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scrumpoker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Prisma (migrations + app queries) AND the pg LISTEN/NOTIFY hub both read
      # DATABASE_URL. `db` is the compose service hostname.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-scrumpoker}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      NODE_ENV: production
      # Sentry (server) — optional; leave blank to disable.
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Public (browser) — optional.
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      # Public QR invite (PO session header) — see the top comment above.
      PUBLIC_JOIN_URL_MODE: ${PUBLIC_JOIN_URL_MODE:-ngrok}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      NGROK_API_URL: ${NGROK_API_URL:-http://ngrok:4040/api/tunnels}
    ports:
      - "3000:3000"
    healthcheck:
      # busybox wget (present in node:alpine) — no extra deps needed.
      test:
        ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ngrok:
    image: ngrok/ngrok:latest
    # Only started when the "ngrok" profile is active (set `COMPOSE_PROFILES=
    # ngrok` in ".env" — Compose reads that var directly, no db/web change
    # needed). Skip entirely when PUBLIC_JOIN_URL_MODE=local.
    profiles: ["ngrok"]
    # NOTE: NGROK_AUTHTOKEN intentionally defaults to empty (not a required
    # `:?` var) so a blank token only fails *this* container, not the whole
    # `docker compose up` — db/web must keep working without ngrok configured.
    restart: unless-stopped
    command: ["http", "web:3000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    depends_on:
      web:
        condition: service_healthy

volumes:
  db-data:
