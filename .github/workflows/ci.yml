name: CI

# Runs the full workspace verification on every push and pull request:
# typecheck → lint → build → test, with a real Postgres so the DB-backed
# service/realtime/invariant tests actually execute (not skipped).
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, build & test
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the DB-backed suites. The migrations (incl. the
    # pg_notify triggers) are applied by the "Apply database migrations" step
    # below before tests run.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scrumpoker
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job proceeds.
        options: >-
          --health-cmd "pg_isready -U postgres -d scrumpoker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Drives the @prisma/adapter-pg driver adapter for every DB-backed test.
      # Matches the `postgres` service above (exposed on localhost:5432).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scrumpoker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs pnpm at the version pinned by the root `packageManager` field
      # (pnpm@11.15.1). No version input on purpose so the two never drift.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The Prisma client is generated code (gitignored:
      # packages/db/src/generated). `pnpm install` already runs the db package's
      # `postinstall` generate, but we regenerate explicitly so typecheck/build
      # never depend on install side effects.
      - name: Generate Prisma client
        run: pnpm --filter @scrum-poker/db run db:generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Build
        run: pnpm -r build

      # Bootstrap the schema (init + pg_notify triggers) into the service
      # Postgres BEFORE tests, so the DB-backed suites run instead of skipping.
      - name: Apply database migrations
        run: pnpm --filter @scrum-poker/db run db:deploy

      - name: Test
        run: pnpm -r test
